// ─── SWIPE HOOK ─────────────────────────────────────────────────────────
function useSwipe(onLeft, onRight) {
  const touchStart = useRef(null);
  const touchStartY = useRef(null);
  const onTouchStart = useCallback(function(ev) {
    touchStart.current = ev.touches[0].clientX;
    touchStartY.current = ev.touches[0].clientY;
  }, []);
  const onTouchEnd = useCallback(function(ev) {
    if (touchStart.current === null) return;
    const dx = ev.changedTouches[0].clientX - touchStart.current;
    const dy = ev.changedTouches[0].clientY - touchStartY.current;
    touchStart.current = null;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) onLeft();
      else onRight();
    }
  }, [onLeft, onRight]);
  return { onTouchStart, onTouchEnd };
}

// ─── MOISTURE ───────────────────────────────────────────────────────────
function MoistureView({onTab}) {
  const [assumedMC, setAssumedMC] = useState(50);
  const basePrice=464;
  const assumed=assumedMC/100;
  const loads = [
    {id:"TRK-0847",mc:0.37,tons:25.2,time:"7:14 AM"},
    {id:"TRK-1203",mc:0.44,tons:24.8,time:"8:32 AM"},
    {id:"TRK-0519",mc:0.52,tons:25.5,time:"9:47 AM"},
    {id:"TRK-0962",mc:0.56,tons:24.1,time:"10:15 AM"},
    {id:"TRK-1387",mc:0.41,tons:25.0,time:"11:03 AM"},
  ];
  const enriched=loads.map(l=>{
    const adj=basePrice*(1-l.mc)/(1-assumed);
    const delta=adj-basePrice;
    return{...l,adjusted:adj.toFixed(0),delta:delta.toFixed(0),over:delta<0};
  });
  const totalDelta=enriched.reduce((s,l)=>s+parseFloat(l.delta),0);
  const avgMC=(loads.reduce((s,l)=>s+l.mc,0)/loads.length*100).toFixed(1);
  const totalValue=enriched.reduce((s,l)=>s+parseFloat(l.adjusted),0);

  return e('div',null,
    e(ProductNav,{active:"moisture",onTab:onTab}),
    e(Timestamp),

// ─── WOOD BASKET ────────────────────────────────────────────────────────

    {name:"Sun Mountain (Livingston)",loc:"Livingston, MT",dist:"116 mi",species:"LP, DF",cap:"Studs, ramping",lat:45.66,lng:-110.56},
    {name:"Idaho Forest Group",loc:"St. Maries, ID",dist:"180 mi",species:"WP, DF, GF",cap:"200 MMBF/yr",lat:47.31,lng:-116.56},

  // Topographic map SVG
  function TopoMap() {
    const w=360, h=180;
    // Contour paths representing terrain
    const contours = [

      {d:"M10,110 Q50,70 100,80 T180,65 Q230,55 290,75 T340,70", color:T.rule},
      {d:"M15,130 Q70,100 130,110 T220,95 Q270,85 330,100 T355,95", color:T.rule},
      {d:"M5,150 Q55,130 110,135 T200,125 Q260,120 320,135 T350,130", color:T.rule},
      // Rivers
      {d:"M180,10 Q175,40 185,70 Q190,100 180,140 Q175,160 180,180", color:T.teal+'40', sw:1.5},
      {d:"M120,0 Q115,25 125,50 Q140,70 180,85", color:T.teal+'30', sw:1},
      // Roads
      {d:"M40,90 L100,85 L180,90 L260,80 L340,85", color:T.muted+'50', sw:0.7},

    // Mill positions mapped to SVG coords (approximate geographic positions)
    const millDots = [

      {x:280,y:120,name:"Livingston"},    // Livingston — east
      {x:50,y:60,name:"IFG"},            // St. Maries — west ID
      {x:60,y:100,name:"Clearwater"},     // Lewiston — west ID
    ];

    const ringRadii = [35,55,80,110];
    const ringColors = [T.teal,T.accent,'#E0B04B',T.red];

    return e('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h,style:{display:'block'}},
      // Background terrain fill
      e('rect',{x:0,y:0,width:w,height:h,fill:T.surface}),
      // Contour lines
      contours.map((c,i)=>e('path',{key:'c'+i,d:c.d,fill:'none',stroke:c.color||T.rule,strokeWidth:c.sw||0.5,opacity:0.7})),
      // Isochrone rings (ellipses for road-network approximation)
      ringRadii.map((r,i)=>e('ellipse',{key:'r'+i,cx:180,cy:90,rx:r,ry:r*0.65,
        fill:'none',stroke:ringColors[i],strokeWidth:selectedZone===i?1.5:0.7,
        opacity:selectedZone===i?0.8:0.3,strokeDasharray:selectedZone===i?'none':'4,3',
        style:{cursor:'pointer'},
        onClick:function(){setSelectedZone(selectedZone===i?null:i)}
      })),
      // Center point (Missoula)
      e('rect',{x:177,y:87,width:6,height:6,fill:T.accent}),
      e('text',{x:180,y:82,textAnchor:'middle',fill:T.accent,fontSize:7,fontFamily:'JetBrains Mono'},'MISSOULA'),
      // Mill dots
      millDots.map((m,i)=>e('g',{key:'m'+i},
        e('rect',{x:m.x-2,y:m.y-2,width:4,height:4,fill:T.accent,opacity:0.8}),
        e('text',{x:m.x,y:m.y-5,textAnchor:'middle',fill:T.text2,fontSize:5.5,fontFamily:'JetBrains Mono'},m.name)
      )),
      // Geographic labels
      e('text',{x:15,y:15,fill:T.muted,fontSize:6,fontFamily:'JetBrains Mono'},'IDAHO'),
      e('text',{x:250,y:15,fill:T.muted,fontSize:6,fontFamily:'JetBrains Mono'},'MONTANA'),
      e('text',{x:330,y:170,fill:T.muted+'60',fontSize:5,fontFamily:'JetBrains Mono'},'N\u2191')
    );
  }

  return e('div',null,
    e(ProductNav,{active:"basket",onTab:onTab}),
    e(Timestamp),
    // Map visualization — topographic style
    e('div',{style:{marginBottom:16,borderBottom:`1px solid ${T.rule}`,paddingBottom:8}},
      e(TopoMap),
      e('div',{style:{fontSize:9,color:T.muted,marginTop:6}},'Missoula, MT | Haul-cost isochrones (road-network) | Tap rings to filter')
    ),
    // Profit rings — interactive
    e('div',{style:{marginBottom:24}},
      e('div',{style:{fontSize:10,color:T.accent,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'PROFIT RINGS'),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        zones.map((z,i)=>e('div',{key:z.ring,onClick:()=>setSelectedZone(selectedZone===z.idx?null:z.idx),style:{display:'flex',alignItems:'center',gap:8,padding:'8px 0',paddingLeft:i%2===1?12:0,borderBottom:`1px solid ${T.rule}`,borderRight:i%2===0?`1px solid ${T.rule}`:'none',cursor:'pointer',background:selectedZone===z.idx?T.surfaceHi:'transparent'}},
          e('div',{style:{width:4,height:4,background:z.color,flexShrink:0}}),
          e('div',null,
            e('div',{style:{fontSize:11,fontWeight:selectedZone===z.idx?700:600,color:selectedZone===z.idx?T.text:T.text}},z.ring),
            e('div',{style:{fontSize:9,color:T.muted}},z.haul+' ('+z.pct+' of gate)')
          )
        ))
      ),
      selectedZone!==null && e('div',{style:{marginTop:8,padding:'8px 0',borderBottom:`1px solid ${T.rule}`}},
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em',marginBottom:4}},'ZONE DETAIL'),
        e('div',{style:{fontSize:11,color:T.text2,lineHeight:1.6}},
          selectedZone===0?'Prime zone. Lowest haul cost, highest margin. Most competitive — every mill in range fights for this wood.':
          selectedZone===1?'Core procurement zone. Moderate haul cost, strong margins. Sweet spot for most operations.':
          selectedZone===2?'Extended zone. Haul cost starts eating margin. Worth it for premium species or high stumpage spreads.':
          'Outer ring. Only pencils on high-value sorts or when closer supply is tight. Monitor, don\u2019t chase.'
        )
      )
    ),
    // Competing mills
    e('div',null,
      e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'COMPETING MILLS IN RANGE'),
      mills.map((m,i)=>e('div',{key:m.name,style:{padding:'8px 0',borderBottom:i<mills.length-1?`1px solid ${T.rule}`:'none'}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
          e('span',{style:{fontSize:12,fontWeight:600}},m.name),
          e('span',{style:{fontSize:11,color:T.accent,fontWeight:600}},m.dist)
        ),
        e('div',{style:{fontSize:10,color:T.muted,marginTop:2}},m.loc+' | '+m.species+' | '+m.cap)
      ))
    )
  );
}

// ─── SCENARIOS (for home tiles) ─────────────────────────────────────────
const SCENARIO_CAPTIONS = {
  dash:"Every public pricing source across MT, ID, WA, OR. Updated automatically. One login.",
  bench:"Your active timber sales benchmarked against regional delivered costs. The math you already do, consolidated and current.",
  moisture:"Runs alongside your existing scale system. Same buying process. You just see the adjusted value of every load as it crosses.",
  basket:"Haul-cost isochrones on actual road networks, not radius circles. See who\u2019s competing for the same wood and where your cost advantage lives.",
};

const TAB_COMPONENTS = {dash:DashboardView, bench:BenchmarkView, moisture:MoistureView, basket:BasketView};

// ─── APP ────────────────────────────────────────────────────────────────
function App() {
  const [view,setView] = useState("home");
  const [activeTab,setActiveTab] = useState("dash");
  const containerRef = useRef(null);

  function scrollTop(){if(containerRef.current)containerRef.current.scrollTop=0;}
  function openTab(id){setActiveTab(id);setView("feature");scrollTop();}
  function goHome(){setView("home");scrollTop();}
  function goCTA(){setView("cta");scrollTop();}

  const tabIdx = TABS.findIndex(t=>t.id===activeTab);
  const swipeLeft = useCallback(function(){
    if(view==="feature" && tabIdx<TABS.length-1){
      setActiveTab(TABS[tabIdx+1].id);scrollTop();
    }
  },[view,tabIdx]);
  const swipeRight = useCallback(function(){
    if(view==="feature" && tabIdx>0){
      setActiveTab(TABS[tabIdx-1].id);scrollTop();
    }
  },[view,tabIdx]);
  const swipeHandlers = useSwipe(swipeLeft, swipeRight);

  const Comp = TAB_COMPONENTS[activeTab];

  return e('div',{style:{background:T.bg,color:T.text,height:'100dvh',maxWidth:480,margin:'0 auto',position:'relative',display:'flex',flexDirection:'column'}},
    // Header
    e('div',{style:{padding:'16px 20px 12px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
      e('div',{onClick:view!=="home"?goHome:undefined,style:{cursor:view!=="home"?'pointer':'default'}},
        e('div',{style:{fontSize:16,fontWeight:700,letterSpacing:'0.2em',color:T.accent}},'KYTHEREX'),
        e('div',{style:{fontSize:9,fontWeight:400,letterSpacing:'0.15em',color:T.muted,marginTop:1}},'TIMBER PROCUREMENT ANALYTICS')
      ),
      view!=="home" && e('button',{onClick:goHome,style:{background:'none',border:`1px solid ${T.rule}`,padding:'5px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,color:T.text2,fontSize:11}},
        e(IconX,{size:12}),' Close'
      )
    ),
    // Content — swipeable
    e('div',Object.assign({ref:containerRef,style:{padding:20,overflowY:'auto',flex:1,paddingBottom:view==="feature"?80:20}},
      view==="feature"?swipeHandlers:{}),
      view==="home" && e('div',null,
        e('div',{style:{marginBottom:24}},
          e('div',{style:{fontSize:18,fontWeight:700,lineHeight:1.3,marginBottom:8}},'See what KYTHEREX does.'),
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},'Four capabilities. All running on real public data from MT, ID, WA, and OR. Tap any to explore.')
        ),
        TABS.map(s=>e('div',{key:s.id,onClick:()=>openTab(s.id),style:{borderBottom:`1px solid ${T.rule}`,padding:'16px 0',cursor:'pointer'}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('div',{style:{display:'flex',gap:12,alignItems:'flex-start'}},
              e('div',{style:{color:s.color,marginTop:2}},e(s.iconFn,{size:16,color:s.color})),
              e('div',null,
                e('div',{style:{fontSize:14,fontWeight:700,marginBottom:4}},s.title),
                e('div',{style:{fontSize:11,color:T.text2,lineHeight:1.5}},s.subtitle)
              )
            ),
            e(IconChev,{size:16,color:T.muted})
          )
        )),
        e('div',{style:{marginTop:24,padding:'16px 0',borderTop:`1px solid ${T.rule}`}},
          e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.15em'}},'STRATHEX, INC.'),
          e('div',{style:{fontSize:11,color:T.text2,marginTop:4}},'Built in Montana, for Montana.')
        )
      ),
      view==="feature" && Comp && e('div',null,
        e(Comp,{onTab:openTab}),
        // Swipe hint
        e('div',{style:{display:'flex',justifyContent:'center',gap:6,marginTop:16,paddingTop:8}},
          TABS.map((t,i)=>e('div',{key:t.id,style:{width:t.id===activeTab?16:6,height:3,background:t.id===activeTab?T.accent:T.rule,transition:'width 0.15s'}}))
        ),
        e('div',{style:{marginTop:12,padding:'12px 0',borderTop:`1px solid ${T.rule}`}},
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},SCENARIO_CAPTIONS[activeTab])
        )
      ),
      view==="cta" && e(CTAScreen,{onBack:goHome})
    ),
    // Bottom bar
    view==="feature" && e('div',{style:{position:'absolute',bottom:0,left:0,right:0,padding:'10px 20px 22px',background:`linear-gradient(transparent, ${T.bg} 30%)`,display:'flex',justifyContent:'space-between',zIndex:10}},
      e('button',{onClick:goHome,style:{background:T.surface,border:`1px solid ${T.rule}`,padding:'10px 16px',color:T.text2,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
        e(IconLeft,{size:14}),' Features'
      ),
      e('button',{onClick:goCTA,style:{background:T.accent,border:'none',padding:'10px 20px',color:'#0A0C0B',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
        'Your numbers ',e(IconRight,{size:14,color:'#0A0C0B'})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

if ('serviceWorker' in navigator) {
