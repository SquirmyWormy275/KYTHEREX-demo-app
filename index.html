// --- MAP COMPONENT ---
function ProductMap({mill, season, selectedCounty, onSelectCounty}) {
  const w=360, h=220;
  const cx = mill.mapCenter.x, cy = mill.mapCenter.y;
  const rs = season.ringScale;

  const contours = [
    {d:"M20,60 Q60,20 120,35 T200,28 Q260,22 320,40 T350,35",c:T.rule},
    {d:"M10,90 Q50,55 100,65 T180,50 Q230,40 290,58 T340,52",c:T.rule},
    {d:"M15,120 Q70,90 130,100 T220,85 Q270,75 330,90 T355,85",c:T.rule},
    {d:"M5,150 Q55,125 110,130 T200,118 Q260,112 320,128 T350,122",c:T.rule},
    {d:"M10,175 Q60,155 120,162 T210,148 Q265,142 325,158 T355,150",c:T.rule},
    {d:"M180,5 Q175,35 185,65 Q190,95 180,135 Q175,165 180,210",c:T.teal+'30',sw:1.5},
    {d:"M120,0 Q115,20 125,45 Q140,65 180,80",c:T.teal+'20',sw:1},
    {d:"M50,30 Q55,50 60,75 Q65,95 55,120",c:T.teal+'20',sw:1},
    {d:"M10,85 L80,78 L180,85 L280,75 L350,80",c:T.muted+'40',sw:0.7},
    {d:"M180,10 L180,85 L180,200",c:T.muted+'40',sw:0.7},
    {d:"M30,40 L100,60 L180,85",c:T.muted+'30',sw:0.5},
  ];

  const baseRadii = [22,38,55,72,90,108];
  const ringRadii = baseRadii.map(function(r){return r * rs;});
  const ringColors = [T.green,T.green,T.yellow,T.yellow,T.red,T.red];

  const allMills = [
    {x:200,y:25,name:"Stoltze",st:"MT",id:"MT-001"},
    {x:180,y:90,name:"Sun Mtn",st:"MT",id:"MT-005"},
    {x:120,y:55,name:"Thompson R.",st:"MT",id:"MT-007"},
    {x:280,y:118,name:"Livingston",st:"MT",id:"MT-006"},
    {x:240,y:45,name:"Kalispell",st:"MT",id:"MT-003"},
    {x:160,y:72,name:"Pyramid Mtn",st:"MT",id:"MT-004"},
    {x:55,y:95,name:"IFG Lewis.",st:"ID",id:"ID-001"},
    {x:60,y:108,name:"Clearwater",st:"ID",id:"ID-002"},
    {x:70,y:55,name:"IFG St.Mar",st:"ID",id:"ID-003"},
    {x:85,y:40,name:"Stimson",st:"ID",id:"ID-004"},
    {x:45,y:75,name:"Bennett",st:"ID",id:"ID-005"},
    {x:20,y:75,name:"SPI Shelton",st:"WA",id:"WA-003"},
    {x:10,y:60,name:"Weyerh. LV",st:"WA",id:"WA-001"},
    {x:15,y:95,name:"Boise Cas.",st:"WA",id:"WA-002"},
    {x:330,y:140,name:"RY Timber",st:"OR",id:"OR-001"},
  ];

  var maxVol = 0;
  for (var ci=0; ci<COUNTIES.length; ci++) { if(COUNTIES[ci].vol>maxVol) maxVol=COUNTIES[ci].vol; }

  var stColors = {MT:T.text,ID:"#6BA3D6",WA:"#E89040",OR:"#D05050"};

  return e('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',style:{display:'block',background:T.surface}},
    contours.map(function(c,i){return e('path',{key:'c'+i,d:c.d,fill:'none',stroke:c.c,strokeWidth:c.sw||0.5,opacity:0.6});}),
    ringRadii.map(function(r,i){return e('ellipse',{key:'ring'+i,cx:cx,cy:cy,rx:r,ry:r*0.55,
      fill:ringColors[i],fillOpacity:0.06,stroke:ringColors[i],strokeWidth:0.8,
      opacity:0.5,strokeDasharray:i>3?'4,3':'none'
    });}),
    COUNTIES.map(function(c,i){
      var r = 3 + (c.vol/maxVol)*10;
      var isSel = selectedCounty && selectedCounty.fips===c.fips;
      var dx = c.cx-cx, dy = c.cy-cy;
      var dist = Math.sqrt(dx*dx+dy*dy);
      var bColor = dist<38*rs ? T.green : dist<72*rs ? T.yellow : T.red;
      return e('g',{key:'fia'+i,onClick:function(ev){ev.stopPropagation();onSelectCounty(isSel?null:c);},style:{cursor:'pointer'}},
        e('circle',{cx:c.cx,cy:c.cy,r:r,fill:bColor,fillOpacity:isSel?0.4:0.15,stroke:isSel?T.accent:bColor,strokeWidth:isSel?1.5:0.5}),
        r>6 && e('text',{x:c.cx,y:c.cy+2,textAnchor:'middle',fill:T.text2,fontSize:4.5,fontFamily:'JetBrains Mono'},c.name.substring(0,6))
      );
    }),
    allMills.map(function(m,i){
      var isSelected = m.id===mill.id;
      var col = stColors[m.st]||T.text;
      return e('g',{key:'m'+i},
        isSelected ?
          e('rect',{x:m.x-4,y:m.y-4,width:8,height:8,fill:T.accent,style:{animation:'pulse 2s infinite'}}) :
          e('rect',{x:m.x-2,y:m.y-2,width:4,height:4,fill:col,opacity:0.7}),
        isSelected && e('text',{x:m.x,y:m.y-7,textAnchor:'middle',fill:T.accent,fontSize:6,fontWeight:700,fontFamily:'JetBrains Mono'},mill.city.toUpperCase())
      );
    }),
    e('text',{x:8,y:12,fill:T.muted+'80',fontSize:6,fontFamily:'JetBrains Mono'},'IDAHO'),
    e('text',{x:250,y:12,fill:T.muted+'80',fontSize:6,fontFamily:'JetBrains Mono'},'MONTANA'),
    e('text',{x:8,y:205,fill:T.muted+'60',fontSize:5,fontFamily:'JetBrains Mono'},'WASHINGTON'),
    e('g',{transform:'translate(290,180)'},
      e('rect',{x:0,y:0,width:6,height:6,fill:T.green,opacity:0.4}),
      e('text',{x:9,y:5,fill:T.muted,fontSize:5,fontFamily:'JetBrains Mono'},'Profitable'),
      e('rect',{x:0,y:10,width:6,height:6,fill:T.yellow,opacity:0.4}),
      e('text',{x:9,y:15,fill:T.muted,fontSize:5,fontFamily:'JetBrains Mono'},'Marginal'),
      e('rect',{x:0,y:20,width:6,height:6,fill:T.red,opacity:0.4}),
      e('text',{x:9,y:25,fill:T.muted,fontSize:5,fontFamily:'JetBrains Mono'},'Uneconomic')
    ),
    e('text',{x:345,y:15,fill:T.muted+'60',fontSize:6,fontFamily:'JetBrains Mono'},'N\u2191'),
    season.id!=="normal" && e('g',{transform:'translate(10,175)'},
      e('rect',{x:0,y:0,width:88,height:14,fill:T.red+'30',rx:0}),
      e('text',{x:4,y:10,fill:T.red,fontSize:5.5,fontWeight:700,fontFamily:'JetBrains Mono'},
        season.id==="mud"?'MUD SEASON -35% RANGE':
        season.id==="winter"?'WINTER -15% RANGE':
        'FROZEN GROUND +5%')
    )
  );
}

// --- BID RECOMMENDATION CARD ---
function BidCard({mill, county, season, diesel, stumpageAsk, mcActual}) {
  var haulMult = season.mult;
  var adjHaul = Math.round(mill.cost.haul * haulMult);
  var adjDelivered = stumpageAsk + mill.cost.logging + adjHaul;
  var assumed = mill.moisture.assumed/100;
  var actual = mcActual/100;
  var flatPrice = mill.moisture.flat;
  var adjPrice = (flatPrice * (1-actual)/(1-assumed));
  var overpay = flatPrice - adjPrice;
  var annualWaste = Math.round(overpay * 100000);
  var dieselDelta = (diesel - 3.10) * 4.0;
  var finalDelivered = adjDelivered + Math.round(dieselDelta);
  var pTarget = Math.max(40, Math.min(95, mill.mc.pTarget - (season.mult-1)*80 + (stumpageAsk<212?8:-5)));
  var rec = pTarget >= 65 ? "BID" : pTarget >= 50 ? "CAUTIOUS" : "PASS";
  var recColor = rec==="BID"?T.teal:rec==="CAUTIOUS"?T.yellow:T.red;

  return e('div',null,
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      e('div',{style:{fontSize:9,color:T.accent,letterSpacing:'0.15em',fontWeight:700}},'BID RECOMMENDATION'),
      e('div',{style:{padding:'3px 8px',background:recColor+'20',border:'1px solid '+recColor,fontSize:11,fontWeight:800,color:recColor}},rec)
    ),
    county && e('div',{style:{fontSize:10,color:T.text2,marginBottom:12}},
      county.name+' County, '+county.st+' | '+season.label
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,marginBottom:12}},
      e('div',{style:{padding:'8px 0',borderRight:'1px solid '+T.rule}},
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em'}},'DELIVERED COST'),
        e('div',{style:{display:'flex',alignItems:'baseline',gap:2}},
          e('span',{style:{fontSize:28,fontWeight:800,color:T.accent}},'$'+finalDelivered),
          e('span',{style:{fontSize:10,color:T.muted}},'/MBF')
        )
      ),
      e('div',{style:{padding:'8px 0 8px 12px'}},
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em'}},'BID CONFIDENCE'),
        e('div',{style:{display:'flex',alignItems:'baseline',gap:2}},
          e('span',{style:{fontSize:28,fontWeight:800,color:pTarget>=65?T.teal:T.yellow}},Math.round(pTarget)+'%'),

      ].map(function(r,i){return e('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid '+T.rule}},

  var visible=_v[0]; var setVisible=_v[1];
  var _s = useState(true);  var showSales=_s[0];      var setShowSales=_s[1];
  var _c = useState(false); var contestedOnly=_c[0];  var setContestedOnly=_c[1];

  useEffect(function(){
    if(!containerRef.current || stateRef.current) return;
    if(typeof L === "undefined") return;
    var map = L.map(containerRef.current, {zoomControl:true, attributionControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
    }).addTo(map);
    map.fitBounds([[45.6,-116.2],[49.0,-112.0]]);
    stateRef.current = {map:map, layers:[]};
    setTimeout(function(){ if(stateRef.current) stateRef.current.map.invalidateSize(); }, 120);
    return function(){ if(stateRef.current){ stateRef.current.map.remove(); stateRef.current=null; } };
  }, []);

  useEffect(function(){
    if(!stateRef.current) return;
    var s = stateRef.current;
    s.layers.forEach(function(l){ s.map.removeLayer(l); });
    s.layers = [];
    COMPETITION_MILLS.forEach(function(m){
      if(!visible[m.id]) return;
      m.rings.forEach(function(ring){
        var fo = ring.cls==="profitable"?0.20:(ring.cls==="marginal"?0.10:0.04);
        var c = L.circle([m.lat,m.lon], {
          radius: ring.r*1609.34, color:m.color, weight:1.5, opacity:0.55,
          fillColor:m.color, fillOpacity:fo
        }).addTo(s.map);
        s.layers.push(c);
      });
      var mm = L.circleMarker([m.lat,m.lon], {
        radius:9, color:"#fff", weight:3, fillColor:m.color, fillOpacity:1
      }).bindPopup('<div style="font-family:system-ui"><b>'+m.name+'</b><br/>'+m.city+', MT</div>').addTo(s.map);
      s.layers.push(mm);
    });
    if(showSales){
      COMPETITION_SALES.forEach(function(sale){
        if(contestedOnly && sale.status!=="contested") return;
        var fill="#9CA3AF", r=5;
        if(sale.status==="contested"){ fill="#F87171"; r=9; }
        else if(sale.status==="exclusive"){
          var owner = COMPETITION_MILLS.find(function(m){return m.id===sale.by[0];});

    ),
    e('div',{ref:containerRef, style:{flex:1, minHeight:320, background:'#f5f5f0'}}),
    e('div',{style:{padding:'8px 16px',borderTop:'1px solid '+T.rule,fontSize:9,color:T.muted,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}},

      e('span',{style:{color:T.red,fontWeight:600}}, 'TAP A SALE')

}
