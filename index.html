<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const e = React.createElement;
const { useState, useRef } = React;

// ─── THEME ──────────────────────────────────────────────────────────────
const T = {
  bg:"#0A0C0B", surface:"#111614", surfaceHi:"#1C2420",
  text:"#F0EDE6", text2:"#9CA38C", muted:"#6B7260",
  accent:"#C8F560", accentDim:"rgba(200,245,96,0.12)",
  teal:"#3DFFD0", red:"#D94840",
  rule:"#243128",
};

// ─── SVG ICONS (inline, no dep) ─────────────────────────────────────────
function Icon({d, size=14, color=T.muted, sw=2}) {
  return e('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'},
    Array.isArray(d) ? d.map((p,i)=>e('path',{key:i,d:p})) : e('path',{d})
  );
}
function IconLayers(p){return Icon({d:['M12 2L2 7l10 5 10-5-10-5z','M2 17l10 5 10-5','M2 12l10 5 10-5'],...p})}
function IconTrend(p){return Icon({d:['M23 6l-9.5 9.5-5-5L1 18'],...p})}
function IconDrop(p){return Icon({d:['M12 2.69l5.66 5.66a8 8 0 11-11.31 0z'],...p})}
function IconMap(p){return Icon({d:['M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z','M12 13a3 3 0 100-6 3 3 0 000 6z'],...p})}
function IconChev(p){return Icon({d:'M9 18l6-6-6-6',...p})}
function IconX(p){return Icon({d:['M18 6L6 18','M6 6l12 12'],...p})}
function IconLeft(p){return Icon({d:['M19 12H5','M12 19l-7-7 7-7'],...p})}
function IconRight(p){return Icon({d:['M5 12h14','M12 5l7 7-7 7'],...p})}
function IconRefresh(p){return Icon({d:['M23 4v6h-6','M1 20v-6h6','M3.51 9a9 9 0 0114.85-3.36L23 10','M20.49 15a9 9 0 01-14.85 3.36L1 14'],...p})}
function IconSearch(p){return Icon({d:['M11 19a8 8 0 100-16 8 8 0 000 16z','M21 21l-4.35-4.35'],...p})}
function IconFilter(p){return Icon({d:['M22 3H2l8 9.46V19l4 2v-8.54L22 3z'],...p})}
function IconClock(p){return Icon({d:['M12 22a10 10 0 100-20 10 10 0 000 20z','M12 6v6l4 2'],...p})}
function IconAlert(p){return Icon({d:['M12 22a10 10 0 100-20 10 10 0 000 20z','M12 8v4','M12 16h.01'],...p})}
function IconTree(p){return Icon({d:['M17 14l3-4h-4l3-4h-4l3-4H6l3 4H5l3 4H4l3 4H2l8 4v4','M14 22v-4l8-4'],...p})}
function IconPhone(p){return Icon({d:['M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z'],...p})}
function IconMail(p){return Icon({d:['M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z','M22 6l-10 7L2 6'],...p})}

// ─── PRODUCT NAV ────────────────────────────────────────────────────────
function ProductNav({active}) {
  const tabs = [
    {id:"dash",label:"DASH"},
    {id:"bench",label:"BENCH"},
    {id:"moisture",label:"MC"},
    {id:"basket",label:"BASKET"},
  ];
  return e('div',{style:{display:'flex',gap:0,marginBottom:16,borderBottom:`1px solid ${T.rule}`}},
    tabs.map(t=>e('div',{key:t.id,style:{
      padding:'8px 12px',fontSize:10,fontWeight:active===t.id?600:500,
      letterSpacing:'0.1em',textTransform:'uppercase',
      color:active===t.id?T.accent:T.muted,
      borderBottom:active===t.id?`2px solid ${T.accent}`:'2px solid transparent',
    }},t.label))
  );
}

function Timestamp() {
  return e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.muted,marginBottom:12}},
    e(IconRefresh,{size:10}),' Updated 8 min ago from BBER, MT DOR, IDL, WA DNR'
  );
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────
function DashboardView() {
  const stats = [
    {label:"DF DELIVERED",value:"$464",sub:"/MBF",note:"BBER Q1 2025",color:T.accent},
    {label:"NW STUMPAGE",value:"$212",sub:"/MBF",note:"MT DOR FY2023",color:T.text},
    {label:"SPREAD",value:"$252",sub:"/MBF",note:"Logging + hauling",color:T.accent},
    {label:"IDL ROLLING",value:"$306",sub:"/MBF",note:"Up 30% YoY",color:T.teal},
  ];
  const alerts = [
    {text:"DF stumpage up 8.7% in NW zone since Q4",type:"up"},
    {text:"Cedar spread widened $45/MBF vs. last month",type:"alert"},
    {text:"IDL rolling avg hit $306/MBF, highest since 2022",type:"up"},
  ];
  const species = [
    {sp:"W. Red Cedar",p:"$500",d:"-23%",down:true},
    {sp:"Douglas-fir",p:"$464",d:"+8.7%",down:false},
    {sp:"W. Larch",p:"$457",d:"+7.0%",down:false},
    {sp:"Ponderosa",p:"$375",d:"+4.2%",down:false},
    {sp:"Grand Fir",p:"$373",d:"-3.1%",down:true},
  ];

  return e('div',null,
    e(ProductNav,{active:"dash"}),
    e(Timestamp),
    // Hero price
    e('div',{style:{marginBottom:24}},
      e('div',{style:{fontSize:10,letterSpacing:'0.15em',textTransform:'uppercase',color:T.muted,marginBottom:4}},'DF DELIVERED — BBER Q1 2025'),
      e('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
        e('span',{style:{fontSize:48,fontWeight:800,color:T.accent,lineHeight:1}},'$464'),
        e('span',{style:{fontSize:14,color:T.muted}},'/MBF'),
        e('span',{style:{fontSize:13,fontWeight:600,color:T.teal}},'+8.7%')
      )
    ),
    // Stats grid — hairline separated
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,marginBottom:24}},
      stats.slice(1).map((s,i)=>e('div',{key:i,style:{padding:'12px 0',paddingLeft:i%2===1?12:0,borderBottom:`1px solid ${T.rule}`,borderRight:i%2===0?`1px solid ${T.rule}`:'none'}},
        e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.1em',marginBottom:4}},s.label),
        e('div',{style:{display:'flex',alignItems:'baseline',gap:2}},
          e('span',{style:{fontSize:22,fontWeight:700,color:s.color}},s.value),
          e('span',{style:{fontSize:11,color:T.muted}},s.sub)
        ),
        e('div',{style:{fontSize:9,color:T.text2,marginTop:2}},s.note)
      ))
    ),
    // Alerts
    e('div',{style:{marginBottom:24}},
      e('div',{style:{fontSize:10,color:T.accent,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'ALERTS'),
      alerts.map((a,i)=>e('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:i<alerts.length-1?`1px solid ${T.rule}`:'none'}},
        e('div',{style:{width:4,height:4,background:a.type==="up"?T.teal:T.accent,flexShrink:0}}),
        e('span',{style:{fontSize:11,color:T.text2,lineHeight:1.4}},a.text)
      ))
    ),
    // Species table
    e('div',null,
      e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'MT DELIVERED — BBER Q1 2025'),
      species.map((r,i)=>e('div',{key:r.sp,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<4?`1px solid ${T.rule}`:'none'}},
        e('span',{style:{fontSize:12,fontWeight:500}},r.sp),
        e('div',{style:{display:'flex',alignItems:'center',gap:12}},
          e('span',{style:{fontSize:12,fontWeight:700}},r.p),
          e('span',{style:{fontSize:11,fontWeight:600,color:r.down?T.red:T.teal}},r.d)
        )
      ))
    )
  );
}

// ─── BENCHMARKING ───────────────────────────────────────────────────────
function BenchmarkView() {
  const units = [
    {name:"Bonner Creek",dist:"25 mi",delivered:377,vs:-6.2,stump:225,log:110,haul:42},
    {name:"Lolo Pass",dist:"40 mi",delivered:383,vs:-4.7,stump:210,log:115,haul:58},
    {name:"Seeley Lake",dist:"55 mi",delivered:398,vs:-1.0,stump:195,log:125,haul:78},
    {name:"Superior",dist:"90 mi",delivered:420,vs:4.5,stump:145,log:150,haul:125},
  ];
  const regional = 402;
  const barMax = 450;
  const benchPct = (regional/barMax)*100;

  return e('div',null,
    e(ProductNav,{active:"bench"}),
    e(Timestamp),
    // Search / filter
    e('div',{style:{display:'flex',gap:8,marginBottom:16}},
      e('div',{style:{flex:1,display:'flex',alignItems:'center',gap:6,borderBottom:`1px solid ${T.rule}`,padding:'8px 0'}},
        e(IconSearch,{size:12}),' ',e('span',{style:{fontSize:11,color:T.muted}},'Douglas-fir, NW Zone')
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:4,borderBottom:`1px solid ${T.rule}`,padding:'8px 0',fontSize:11,color:T.muted}},
        e(IconFilter,{size:12}),' 100 mi'
      )
    ),
    // Benchmark header
    e('div',{style:{padding:'12px 0',marginBottom:16,borderBottom:`1px solid ${T.accent}`}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
        e('div',null,
          e('div',{style:{fontSize:10,color:T.accent,fontWeight:600,letterSpacing:'0.15em'}},'REGIONAL BENCHMARK'),
          e('div',{style:{fontSize:10,color:T.text2,marginTop:2}},'DF delivered, NW MT, Q1 2025')
        ),
        e('div',null,
          e('span',{style:{fontSize:28,fontWeight:800,color:T.accent}},'$402'),
          e('span',{style:{fontSize:11,fontWeight:400,color:T.muted}},'/MBF')
        )
      )
    ),
    // Source rows
    e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'ACTIVE SOURCES VS. BENCHMARK'),
    units.map(u=>{
      const unitPct=(u.delivered/barMax)*100;
      const isBelow=u.delivered<regional;
      return e('div',{key:u.name,style:{padding:'12px 0',borderBottom:`1px solid ${T.rule}`}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}},
          e('div',null,
            e('span',{style:{fontSize:13,fontWeight:700}},u.name),
            e('span',{style:{fontSize:11,color:T.muted,marginLeft:8}},u.dist)
          ),
          e('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
            e('span',{style:{fontSize:18,fontWeight:800}},'$'+u.delivered),
            e('span',{style:{fontSize:11,fontWeight:600,color:isBelow?T.teal:T.red}},(isBelow?'':'+')+(u.vs)+'%')
          )
        ),
        e('div',{style:{height:3,background:T.surfaceHi,position:'relative',overflow:'visible'}},
          e('div',{style:{height:'100%',width:unitPct+'%',background:isBelow?T.teal:T.red,opacity:0.6}}),
          e('div',{style:{position:'absolute',left:benchPct+'%',top:-4,width:2,height:11,background:T.accent}})
        ),
        e('div',{style:{fontSize:10,color:T.muted,marginTop:4}},'Stump $'+u.stump+' + Log $'+u.log+' + Haul $'+u.haul)
      );
    }),
    e('div',{style:{fontSize:10,color:T.text2,marginTop:12,lineHeight:1.5}},
      'Sources: BBER quarterly, MT DOR stumpage, IDL auctions, WA DNR tables. All four states, updated quarterly.'
    )
  );
}

// ─── MOISTURE ───────────────────────────────────────────────────────────
function MoistureView() {
  const basePrice=464, assumed=0.50;
  const loads = [
    {id:"TRK-0847",mc:0.37,tons:25.2,time:"7:14 AM"},
    {id:"TRK-1203",mc:0.44,tons:24.8,time:"8:32 AM"},
    {id:"TRK-0519",mc:0.52,tons:25.5,time:"9:47 AM"},
    {id:"TRK-0962",mc:0.56,tons:24.1,time:"10:15 AM"},
    {id:"TRK-1387",mc:0.41,tons:25.0,time:"11:03 AM"},
  ];
  const enriched=loads.map(l=>{
    const adj=basePrice*(1-l.mc)/(1-assumed);
    const delta=adj-basePrice;
    return{...l,adjusted:adj.toFixed(0),delta:delta.toFixed(0),over:delta<0};
  });
  const totalDelta=enriched.reduce((s,l)=>s+parseFloat(l.delta),0);
  const avgMC=(loads.reduce((s,l)=>s+l.mc,0)/loads.length*100).toFixed(1);

  return e('div',null,
    e(ProductNav,{active:"moisture"}),
    e(Timestamp),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:16}},
      e('div',null,
        e('div',{style:{fontSize:13,fontWeight:700}},"Today's Scale Log"),
        e('div',{style:{fontSize:10,color:T.muted}},'Bonner Mill | DF | Flat $464/MBF')
      ),
      e('div',{style:{fontSize:10,color:T.accent,fontWeight:600,letterSpacing:'0.1em'}},'LIVE')
    ),
    // Summary stats — hairline grid
    e('div',{style:{display:'flex',gap:0,marginBottom:16,borderBottom:`1px solid ${T.rule}`}},
      [{label:'AVG MC',value:avgMC+'%',color:parseFloat(avgMC)>50?T.red:T.accent},
       {label:'LOADS',value:''+loads.length,color:T.text},
       {label:'NET ADJUST',value:(totalDelta>0?'+':'')+'$'+totalDelta.toFixed(0),color:totalDelta<0?T.red:T.teal}
      ].map((s,i)=>e('div',{key:i,style:{flex:1,padding:'8px 0',borderRight:i<2?`1px solid ${T.rule}`:'none',paddingLeft:i>0?12:0}},
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em'}},s.label),
        e('div',{style:{fontSize:18,fontWeight:700,color:s.color}},s.value)
      ))
    ),
    // Table header
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 0.6fr 0.8fr 0.8fr 0.7fr',padding:'8px 0',borderBottom:`1px solid ${T.rule}`,fontSize:9,fontWeight:600,color:T.muted,letterSpacing:'0.1em'}},
      e('span',null,'LOAD'),e('span',{style:{textAlign:'center'}},'MC'),e('span',{style:{textAlign:'right'}},'FLAT'),e('span',{style:{textAlign:'right'}},'ADJ'),e('span',{style:{textAlign:'right'}},'DELTA')
    ),
    // Table rows
    enriched.map((l,i)=>e('div',{key:l.id,style:{display:'grid',gridTemplateColumns:'1fr 0.6fr 0.8fr 0.8fr 0.7fr',padding:'9px 0',alignItems:'center',borderBottom:i<enriched.length-1?`1px solid ${T.rule}`:'none'}},
      e('div',null,
        e('div',{style:{fontSize:12,fontWeight:600}},l.id),
        e('div',{style:{fontSize:9,color:T.muted}},l.time+' | '+l.tons+'t')
      ),
      e('div',{style:{textAlign:'center',fontSize:12,fontWeight:700,color:l.mc>0.50?T.red:l.mc<0.42?T.teal:T.text}},(l.mc*100).toFixed(0)+'%'),
      e('div',{style:{textAlign:'right',fontSize:12,color:T.muted}},'$'+basePrice),
      e('div',{style:{textAlign:'right',fontSize:12,fontWeight:700}},'$'+l.adjusted),
      e('div',{style:{textAlign:'right',fontSize:12,fontWeight:700,color:l.over?T.red:T.teal}},(l.over?'':'+')+'$'+l.delta)
    )),
    e('div',{style:{marginTop:16,fontSize:10,color:T.text2,lineHeight:1.5}},
      'Runs alongside your existing scale system. Nothing changes about how you buy. You just see the adjusted value of every load as it crosses.'
    )
  );
}

// ─── WOOD BASKET ────────────────────────────────────────────────────────
function BasketView() {
  const mills = [

    {name:"Sun Mountain Lumber (Livingston)",loc:"Livingston, MT",dist:"116 mi",species:"LP, DF",cap:"Studs, ramping"},
    {name:"Idaho Forest Group",loc:"St. Maries, ID",dist:"180 mi",species:"WP, DF, GF",cap:"200 MMBF/yr"},
    {name:"Clearwater Paper",loc:"Lewiston, ID",dist:"210 mi",species:"Pulp, chips",cap:"n/a"},

  const dots=[{top:'52%',left:'72%'},{top:'25%',left:'38%'},{top:'55%',left:'28%'},{top:'42%',left:'75%'},{top:'60%',left:'68%'}];

  return e('div',null,
    e(ProductNav,{active:"basket"}),
    e(Timestamp),
    // Map visualization
    e('div',{style:{height:160,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',marginBottom:16,position:'relative',overflow:'hidden',borderBottom:`1px solid ${T.rule}`}},
      [130,95,65,35].map((r,i)=>e('div',{key:i,style:{position:'absolute',width:r*2,height:r*1.3,border:`1px solid ${[T.red,'#E0B04B',T.accent,T.teal][i]}40`,borderRadius:'50%',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}})),
      e('div',{style:{width:6,height:6,background:T.accent,position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:2}}),
      e('div',{style:{position:'absolute',bottom:8,left:0,right:0,fontSize:10,color:T.muted,zIndex:2}},'Missoula, MT | Haul-cost isochrones (road-network)'),

    ),
    // Profit rings
    e('div',{style:{marginBottom:24}},
      e('div',{style:{fontSize:10,color:T.accent,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'PROFIT RINGS'),
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        zones.map((z,i)=>e('div',{key:z.ring,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 0',paddingLeft:i%2===1?12:0,borderBottom:`1px solid ${T.rule}`,borderRight:i%2===0?`1px solid ${T.rule}`:'none'}},
          e('div',{style:{width:4,height:4,background:z.color,flexShrink:0}}),
          e('div',null,
            e('div',{style:{fontSize:11,fontWeight:600}},z.ring),
            e('div',{style:{fontSize:9,color:T.muted}},z.haul+' ('+z.pct+' of gate)')
          )
        ))
      )
    ),
    // Competing mills
    e('div',null,
      e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}},'COMPETING MILLS IN RANGE'),
      mills.map((m,i)=>e('div',{key:m.name,style:{padding:'8px 0',borderBottom:i<mills.length-1?`1px solid ${T.rule}`:'none'}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
          e('span',{style:{fontSize:12,fontWeight:600}},m.name),
          e('span',{style:{fontSize:11,color:T.accent,fontWeight:600}},m.dist)
        ),
        e('div',{style:{fontSize:10,color:T.muted,marginTop:2}},m.loc+' | '+m.species+' | '+m.cap)
      ))
    )
  );
}

// ─── SCENARIOS ──────────────────────────────────────────────────────────
const SCENARIOS = [
  {id:"overview",title:"The Dashboard",subtitle:"All your pricing, stumpage, and market data in one screen",color:T.accent,iconFn:IconLayers,component:DashboardView,caption:"Every public pricing source across MT, ID, WA, OR. Updated automatically. One login."},
  {id:"benchmarking",title:"Delivered-Cost Benchmarking",subtitle:"See how your sources compare to the regional market",color:T.teal,iconFn:IconTrend,component:BenchmarkView,caption:"Your active timber sales benchmarked against regional delivered costs. The math you already do, consolidated and current."},
  {id:"moisture",title:"Moisture-Adjusted Pricing",subtitle:"See what each load is actually worth at the scale",color:T.accent,iconFn:IconDrop,component:MoistureView,caption:"Runs alongside your existing scale system. Same buying process. You just see the adjusted value of every load as it crosses."},
  {id:"basket",title:"Wood Basket Intelligence",subtitle:"Your procurement zone, competing mills, and haul economics",color:T.teal,iconFn:IconMap,component:BasketView,caption:"Haul-cost isochrones on actual road networks, not radius circles. See who\u2019s competing for the same wood and where your cost advantage lives."},
];

// ─── CTA ────────────────────────────────────────────────────────────────
function CTAScreen({onBack}) {
  return e('div',{style:{padding:'40px 0',flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'flex-start'}},
    e('div',{style:{fontSize:10,color:T.accent,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}},'KYTHEREX'),
    e('div',{style:{fontSize:22,fontWeight:700,lineHeight:1.3,marginBottom:8}},'This is what KYTHEREX looks like.'),
    e('div',{style:{fontFamily:"'Space Grotesk', sans-serif",fontSize:13,color:T.text2,lineHeight:1.7,marginBottom:32,maxWidth:300}},
      'Everything you just saw runs on public data. Plug in your numbers and it gets a lot more specific. Sits on top of whatever systems you already run. Nothing to rip out.'
    ),
    e('div',{style:{display:'flex',gap:24,marginBottom:32}},
      e('div',null,
        e('div',{style:{fontSize:22,fontWeight:800,color:T.accent}},'$1-5K'),
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em'}},'PER MONTH')
      ),
      e('div',{style:{width:1,background:T.rule}}),
      e('div',null,
        e('div',{style:{fontSize:22,fontWeight:800,color:T.teal}},'3-60x'),
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.1em'}},'TYPICAL ROI')
      )
    ),
    e('div',{style:{width:'100%',maxWidth:300,marginBottom:24,borderBottom:`1px solid ${T.rule}`,paddingBottom:24}},
      e('div',{style:{fontSize:13,fontWeight:700,marginBottom:12}},'Want to see it with your numbers?'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:8,fontSize:13,color:T.text2}},e(IconPhone,{size:13}),' Gillian Shannon'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:8,fontSize:12,color:T.muted}},e(IconTree,{size:13}),' Quality Forest Management'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:T.muted}},e(IconMail,{size:13}),' gillian@strathex.com')
    ),
    e('button',{onClick:onBack,style:{background:'transparent',border:`1px solid ${T.rule}`,padding:'10px 20px',color:T.text2,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
      e(IconLeft,{size:14}),' Back to features'
    )
  );
}

// ─── APP ────────────────────────────────────────────────────────────────
function App() {
  const [view,setView] = useState("home");
  const [featureId,setFeatureId] = useState(null);
  const containerRef = useRef(null);

  function scrollTop(){if(containerRef.current)containerRef.current.scrollTop=0;}
  function openFeature(id){setFeatureId(id);setView("feature");scrollTop();}
  function goHome(){setView("home");setFeatureId(null);scrollTop();}
  function goCTA(){setView("cta");scrollTop();}

  const feature = SCENARIOS.find(s=>s.id===featureId);
  const Comp = feature?.component;

  return e('div',{style:{background:T.bg,color:T.text,height:'100dvh',maxWidth:480,margin:'0 auto',position:'relative',display:'flex',flexDirection:'column'}},
    // Header
    e('div',{style:{padding:'16px 20px 12px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
      e('div',null,
        e('div',{style:{fontSize:16,fontWeight:700,letterSpacing:'0.2em',color:T.accent}},'KYTHEREX'),
        e('div',{style:{fontSize:9,fontWeight:400,letterSpacing:'0.15em',color:T.muted,marginTop:1}},'TIMBER PROCUREMENT ANALYTICS')
      ),
      view!=="home" && e('button',{onClick:goHome,style:{background:'none',border:`1px solid ${T.rule}`,padding:'5px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,color:T.text2,fontSize:11}},
        e(IconX,{size:12}),' Close'
      )
    ),
    // Content
    e('div',{ref:containerRef,style:{padding:20,overflowY:'auto',flex:1,paddingBottom:view==="feature"?80:20}},
      view==="home" && e('div',null,
        e('div',{style:{marginBottom:24}},
          e('div',{style:{fontSize:18,fontWeight:700,lineHeight:1.3,marginBottom:8}},'See what KYTHEREX does.'),
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},'Four capabilities. All running on real public data from MT, ID, WA, and OR. Tap any to explore.')
        ),
        SCENARIOS.map(s=>e('div',{key:s.id,onClick:()=>openFeature(s.id),style:{borderBottom:`1px solid ${T.rule}`,padding:'16px 0',cursor:'pointer'}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('div',{style:{display:'flex',gap:12,alignItems:'flex-start'}},
              e('div',{style:{color:s.color,marginTop:2}},e(s.iconFn,{size:16,color:s.color})),
              e('div',null,
                e('div',{style:{fontSize:14,fontWeight:700,marginBottom:4}},s.title),
                e('div',{style:{fontSize:11,color:T.text2,lineHeight:1.5}},s.subtitle)
              )
            ),
            e(IconChev,{size:16,color:T.muted})
          )
        )),
        e('div',{style:{marginTop:24,padding:'16px 0',borderTop:`1px solid ${T.rule}`}},
          e('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.15em'}},'STRATHEX, INC.'),
          e('div',{style:{fontSize:11,color:T.text2,marginTop:4}},'Built in Montana, for Montana.')
        )
      ),
      view==="feature" && feature && Comp && e('div',null,
        e(Comp),
        e('div',{style:{marginTop:20,padding:'12px 0',borderTop:`1px solid ${T.rule}`}},
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},feature.caption)
        )
      ),
      view==="cta" && e(CTAScreen,{onBack:goHome})
    ),
    // Bottom bar
    view==="feature" && e('div',{style:{position:'absolute',bottom:0,left:0,right:0,padding:'10px 20px 22px',background:`linear-gradient(transparent, ${T.bg} 30%)`,display:'flex',justifyContent:'space-between',zIndex:10}},
      e('button',{onClick:goHome,style:{background:T.surface,border:`1px solid ${T.rule}`,padding:'10px 16px',color:T.text2,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
        e(IconLeft,{size:14}),' Features'
      ),
      e('button',{onClick:goCTA,style:{background:T.accent,border:'none',padding:'10px 20px',color:'#0A0C0B',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
        'Your numbers ',e(IconRight,{size:14,color:'#0A0C0B'})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
