<script>
const e = React.createElement;
const { useState, useRef } = React;

// ─── THEME ──────────────────────────────────────────────────────────────
const T = {
  bg:"#0F1A12", card:"#162119", cardHover:"#1C2B21", overlay:"#0B120E",
  text:"#E8E4DE", text2:"#9CA38C", muted:"#6B7260",
  amber:"#D97706", teal:"#0D9488", purple:"#7C3AED",
  green:"#22C55E", red:"#EF4444", blue:"#3B82F6", border:"#2A3A2E",
};

// ─── SVG ICONS (inline, no dep) ─────────────────────────────────────────
function Icon({d, size=14, color=T.muted, sw=2}) {
  return e('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'},
    Array.isArray(d) ? d.map((p,i)=>e('path',{key:i,d:p})) : e('path',{d})
  );
}
function IconLayers(p){return Icon({d:['M12 2L2 7l10 5 10-5-10-5z','M2 17l10 5 10-5','M2 12l10 5 10-5'],...p})}
function IconTrend(p){return Icon({d:['M23 6l-9.5 9.5-5-5L1 18'],...p})}
function IconDrop(p){return Icon({d:['M12 2.69l5.66 5.66a8 8 0 11-11.31 0z'],...p})}
function IconMap(p){return Icon({d:['M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z','M12 13a3 3 0 100-6 3 3 0 000 6z'],...p})}
function IconChev(p){return Icon({d:'M9 18l6-6-6-6',...p})}
function IconX(p){return Icon({d:['M18 6L6 18','M6 6l12 12'],...p})}
function IconLeft(p){return Icon({d:['M19 12H5','M12 19l-7-7 7-7'],...p})}
function IconRight(p){return Icon({d:['M5 12h14','M12 5l7 7-7 7'],...p})}
function IconRefresh(p){return Icon({d:['M23 4v6h-6','M1 20v-6h6','M3.51 9a9 9 0 0114.85-3.36L23 10','M20.49 15a9 9 0 01-14.85 3.36L1 14'],...p})}
function IconSearch(p){return Icon({d:['M11 19a8 8 0 100-16 8 8 0 000 16z','M21 21l-4.35-4.35'],...p})}
function IconFilter(p){return Icon({d:['M22 3H2l8 9.46V19l4 2v-8.54L22 3z'],...p})}
function IconClock(p){return Icon({d:['M12 22a10 10 0 100-20 10 10 0 000 20z','M12 6v6l4 2'],...p})}
function IconAlert(p){return Icon({d:['M12 22a10 10 0 100-20 10 10 0 000 20z','M12 8v4','M12 16h.01'],...p})}
function IconTree(p){return Icon({d:['M17 14l3-4h-4l3-4h-4l3-4H6l3 4H5l3 4H4l3 4H2l8 4v4','M14 22v-4l8-4'],...p})}
function IconPhone(p){return Icon({d:['M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z'],...p})}
function IconMail(p){return Icon({d:['M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z','M22 6l-10 7L2 6'],...p})}

// ─── PRODUCT NAV ────────────────────────────────────────────────────────
function ProductNav({active}) {
  const tabs = [
    {id:"dash",label:"Dashboard",icon:e(IconLayers,{size:13,color:active==="dash"?T.text:T.muted})},
    {id:"bench",label:"Benchmarks",icon:e(IconTrend,{size:13,color:active==="bench"?T.text:T.muted})},
    {id:"moisture",label:"Moisture",icon:e(IconDrop,{size:13,color:active==="moisture"?T.text:T.muted})},
    {id:"basket",label:"Wood Basket",icon:e(IconMap,{size:13,color:active==="basket"?T.text:T.muted})},
  ];
  return e('div',{style:{display:'flex',gap:2,padding:'8px 4px',background:T.overlay,borderRadius:8,marginBottom:16}},
    tabs.map(t=>e('div',{key:t.id,style:{
      flex:1,display:'flex',alignItems:'center',justifyContent:'center',
      gap:4,padding:'7px 4px',borderRadius:6,fontSize:10,fontWeight:600,
      background:active===t.id?T.card:'transparent',
      color:active===t.id?T.text:T.muted,
      border:active===t.id?`1px solid ${T.border}`:'1px solid transparent',
      letterSpacing:0.3,
    }},t.icon,' ',t.label))
  );
}

function Timestamp() {
  return e('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.muted,marginBottom:12}},
    e(IconRefresh,{size:10}),' Updated 8 min ago from BBER, MT DOR, IDL, WA DNR'
  );
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────
function DashboardView() {
  const stats = [
    {label:"DF Delivered",value:"$464",sub:"/MBF",note:"BBER Q1 2025",color:T.text},
    {label:"NW Stumpage",value:"$212",sub:"/MBF",note:"MT DOR FY2023",color:T.text},
    {label:"Spread",value:"$252",sub:"/MBF",note:"Logging + hauling",color:T.amber},
    {label:"IDL Rolling",value:"$306",sub:"/MBF",note:"Up 30% YoY",color:T.green},
  ];
  const alerts = [
    {text:"DF stumpage up 8.7% in NW zone since Q4",type:"up"},
    {text:"Cedar spread widened $45/MBF vs. last month",type:"alert"},
    {text:"IDL rolling avg hit $306/MBF, highest since 2022",type:"up"},
  ];

    {sp:"W. Red Cedar",p:"$500",d:"-23%",down:true},
    {sp:"Douglas-fir",p:"$464",d:"+8.7%",down:false},
    {sp:"W. Larch",p:"$457",d:"+7.0%",down:false},
    {sp:"Ponderosa",p:"$375",d:"+4.2%",down:false},
    {sp:"Grand Fir",p:"$373",d:"-3.1%",down:true},
  ];

  return e('div',null,
    e(ProductNav,{active:"dash"}),
    e(Timestamp),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}},
      stats.map((s,i)=>e('div',{key:i,style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:12}},
        e('div',{style:{fontSize:10,color:T.muted,letterSpacing:0.5,marginBottom:4}},s.label),
        e('div',{style:{display:'flex',alignItems:'baseline',gap:2}},
          e('span',{style:{fontSize:22,fontWeight:800,color:s.color}},s.value),
          e('span',{style:{fontSize:11,color:T.muted}},s.sub)
        ),
        e('div',{style:{fontSize:9,color:T.text2,marginTop:2}},s.note)
      ))
    ),
    e('div',{style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:14}},
      e('div',{style:{fontSize:11,fontWeight:700,marginBottom:8,display:'flex',alignItems:'center',gap:4}},
        e(IconAlert,{size:12,color:T.amber}),' Market Alerts'
      ),
      alerts.map((a,i)=>e('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:i<alerts.length-1?`1px solid ${T.border}`:'none'}},
        e('div',{style:{width:6,height:6,borderRadius:3,background:a.type==="up"?T.green:T.amber,flexShrink:0}}),
        e('span',{style:{fontSize:12,color:T.text2,lineHeight:1.4}},a.text)
      ))
    ),
    e('div',{style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:12}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
        e('span',{style:{fontSize:11,fontWeight:700}},'Species Prices (MT Delivered)'),
        e('span',{style:{fontSize:9,color:T.muted}},'BBER Q1 2025')
      ),
      species.map((r,i)=>e('div',{key:r.sp,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:i<4?`1px solid ${T.border}`:'none'}},
        e('span',{style:{fontSize:12,fontWeight:500}},r.sp),
        e('div',{style:{display:'flex',alignItems:'center',gap:8}},
          e('span',{style:{fontSize:12,fontWeight:700}},r.p),
          e('span',{style:{fontSize:10,fontWeight:600,color:r.down?T.red:T.green}},r.d)
        )
      ))
    )
  );
}

// ─── BENCHMARKING ───────────────────────────────────────────────────────
function BenchmarkView() {
  const units = [
    {name:"Bonner Creek",dist:"25 mi",delivered:377,vs:-6.2,stump:225,log:110,haul:42},
    {name:"Lolo Pass",dist:"40 mi",delivered:383,vs:-4.7,stump:210,log:115,haul:58},
    {name:"Seeley Lake",dist:"55 mi",delivered:398,vs:-1.0,stump:195,log:125,haul:78},
    {name:"Superior",dist:"90 mi",delivered:420,vs:4.5,stump:145,log:150,haul:125},
  ];
  const regional = 402;
  const barMax = 450;
  const benchPct = (regional/barMax)*100;

  return e('div',null,
    e(ProductNav,{active:"bench"}),
    e(Timestamp),
    e('div',{style:{display:'flex',gap:6,marginBottom:14}},
      e('div',{style:{flex:1,display:'flex',alignItems:'center',gap:6,background:T.overlay,borderRadius:6,padding:'8px 10px',border:`1px solid ${T.border}`}},
        e(IconSearch,{size:12}),' ',e('span',{style:{fontSize:11,color:T.muted}},'Douglas-fir, NW Zone')
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:4,background:T.overlay,borderRadius:6,padding:'8px 10px',border:`1px solid ${T.border}`,fontSize:11,color:T.muted}},
        e(IconFilter,{size:12}),' 100 mi'
      )
    ),
    e('div',{style:{background:T.amber+'15',border:`1px solid ${T.amber}30`,borderRadius:8,padding:'10px 12px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}},
      e('div',null,
        e('div',{style:{fontSize:10,color:T.amber,fontWeight:600,letterSpacing:0.5}},'REGIONAL BENCHMARK'),
        e('div',{style:{fontSize:10,color:T.text2,marginTop:2}},'DF delivered, NW MT, Q1 2025')
      ),
      e('div',{style:{fontSize:22,fontWeight:800,color:T.amber}},'$402',e('span',{style:{fontSize:11,fontWeight:400}},'/MBF'))
    ),
    e('div',{style:{fontSize:11,fontWeight:700,marginBottom:8}},'Active sources vs. benchmark'),
    units.map(u=>{
      const unitPct=(u.delivered/barMax)*100;
      const isBelow=u.delivered<regional;
      return e('div',{key:u.name,style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:8}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}},
          e('div',null,
            e('span',{style:{fontSize:13,fontWeight:700}},u.name),
            e('span',{style:{fontSize:11,color:T.muted,marginLeft:6}},u.dist)
          ),
          e('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
            e('span',{style:{fontSize:16,fontWeight:800}},'$'+u.delivered),
            e('span',{style:{fontSize:11,fontWeight:700,color:isBelow?T.green:T.red}},(isBelow?'':'+')+(u.vs)+'%')
          )
        ),
        e('div',{style:{height:6,background:T.overlay,borderRadius:3,position:'relative',overflow:'visible'}},
          e('div',{style:{height:'100%',width:unitPct+'%',background:isBelow?T.green:T.red,borderRadius:3,opacity:0.7}}),
          e('div',{style:{position:'absolute',left:benchPct+'%',top:-3,width:2,height:12,background:T.amber,borderRadius:1}})
        ),
        e('div',{style:{display:'flex',justifyContent:'space-between',marginTop:4}},
          e('span',{style:{fontSize:9,color:T.muted}},'Stumpage $'+u.stump+' + Log $'+u.log+' + Haul $'+u.haul)
        )
      );
    }),
    e('div',{style:{fontSize:10,color:T.text2,marginTop:8,lineHeight:1.5,padding:8,background:T.overlay,borderRadius:6}},
      'Sources: BBER quarterly, MT DOR stumpage, IDL auctions, WA DNR tables. All four states, updated quarterly.'
    )
  );
}

// ─── MOISTURE ───────────────────────────────────────────────────────────
function MoistureView() {
  const basePrice=464, assumed=0.50;
  const loads = [
    {id:"TRK-0847",mc:0.37,tons:25.2,time:"7:14 AM"},
    {id:"TRK-1203",mc:0.44,tons:24.8,time:"8:32 AM"},
    {id:"TRK-0519",mc:0.52,tons:25.5,time:"9:47 AM"},
    {id:"TRK-0962",mc:0.56,tons:24.1,time:"10:15 AM"},
    {id:"TRK-1387",mc:0.41,tons:25.0,time:"11:03 AM"},
  ];
  const enriched=loads.map(l=>{
    const adj=basePrice*(1-l.mc)/(1-assumed);
    const delta=adj-basePrice;
    return{...l,adjusted:adj.toFixed(0),delta:delta.toFixed(0),over:delta<0};
  });
  const totalDelta=enriched.reduce((s,l)=>s+parseFloat(l.delta),0);
  const avgMC=(loads.reduce((s,l)=>s+l.mc,0)/loads.length*100).toFixed(1);

  return e('div',null,
    e(ProductNav,{active:"moisture"}),
    e(Timestamp),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('div',null,
        e('div',{style:{fontSize:13,fontWeight:700}},"Today's Scale Log"),
        e('div',{style:{fontSize:10,color:T.muted}},'Bonner Mill | Douglas-fir | Flat basket $464/MBF')
      ),
      e('div',{style:{background:T.overlay,borderRadius:6,padding:'6px 10px',border:`1px solid ${T.border}`,fontSize:11,color:T.text2,display:'flex',alignItems:'center',gap:4}},
        e(IconClock,{size:10}),' Live'
      )
    ),
    e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:14}},
      [{label:'AVG MC',value:avgMC+'%',color:parseFloat(avgMC)>50?T.red:T.text},
       {label:'LOADS',value:''+loads.length,color:T.text},
       {label:'NET ADJUST',value:(totalDelta>0?'+':'')+'$'+totalDelta.toFixed(0),color:totalDelta<0?T.red:T.green}
      ].map((s,i)=>e('div',{key:i,style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:8,textAlign:'center'}},
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:0.5}},s.label),
        e('div',{style:{fontSize:18,fontWeight:800,color:s.color}},s.value)
      ))
    ),
    e('div',{style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,overflow:'hidden'}},
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 0.6fr 0.8fr 0.8fr 0.7fr',padding:'8px 10px',background:T.overlay,fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.5}},
        e('span',null,'LOAD'),e('span',{style:{textAlign:'center'}},'MC'),e('span',{style:{textAlign:'right'}},'FLAT'),e('span',{style:{textAlign:'right'}},'ADJUSTED'),e('span',{style:{textAlign:'right'}},'DELTA')
      ),
      enriched.map((l,i)=>e('div',{key:l.id,style:{display:'grid',gridTemplateColumns:'1fr 0.6fr 0.8fr 0.8fr 0.7fr',padding:'9px 10px',alignItems:'center',borderBottom:i<enriched.length-1?`1px solid ${T.border}`:'none'}},
        e('div',null,
          e('div',{style:{fontSize:12,fontWeight:600}},l.id),
          e('div',{style:{fontSize:9,color:T.muted}},l.time+' | '+l.tons+'t')
        ),
        e('div',{style:{textAlign:'center',fontSize:12,fontWeight:700,color:l.mc>0.50?T.red:l.mc<0.42?T.green:T.text}},(l.mc*100).toFixed(0)+'%'),
        e('div',{style:{textAlign:'right',fontSize:12,color:T.muted}},'$'+basePrice),
        e('div',{style:{textAlign:'right',fontSize:12,fontWeight:700}},'$'+l.adjusted),
        e('div',{style:{textAlign:'right',fontSize:12,fontWeight:700,color:l.over?T.red:T.green}},(l.over?'':'+')+'$'+l.delta)
      ))
    ),
    e('div',{style:{marginTop:12,padding:'10px 12px',background:T.overlay,borderRadius:6,fontSize:10,color:T.text2,lineHeight:1.5}},
      'Runs alongside your existing scale system. Nothing changes about how you buy. You just see the adjusted value of every load as it crosses.'
    )
  );
}

      mills.map((m,i)=>e('div',{key:m.name,style:{padding:'8px 0',borderBottom:i<mills.length-1?`1px solid ${T.border}`:'none'}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline'}},
          e('span',{style:{fontSize:12,fontWeight:600}},m.name),
          e('span',{style:{fontSize:11,color:T.amber,fontWeight:600}},m.dist)

// ─── SCENARIOS ──────────────────────────────────────────────────────────
const SCENARIOS = [
  {id:"overview",title:"The Dashboard",subtitle:"All your pricing, stumpage, and market data in one screen",color:T.amber,iconFn:IconLayers,component:DashboardView,caption:"Every public pricing source across MT, ID, WA, OR. Updated automatically. One login."},
  {id:"benchmarking",title:"Delivered-Cost Benchmarking",subtitle:"See how your sources compare to the regional market",color:T.teal,iconFn:IconTrend,component:BenchmarkView,caption:"Your active timber sales benchmarked against regional delivered costs. The math you already do, consolidated and current."},
  {id:"moisture",title:"Moisture-Adjusted Pricing",subtitle:"See what each load is actually worth at the scale",color:T.blue,iconFn:IconDrop,component:MoistureView,caption:"Runs alongside your existing scale system. Same buying process. You just see the adjusted value of every load as it crosses."},
  {id:"basket",title:"Wood Basket Intelligence",subtitle:"Your procurement zone, competing mills, and haul economics",color:T.purple,iconFn:IconMap,component:BasketView,caption:"Haul-cost isochrones on actual road networks, not radius circles. See who\u2019s competing for the same wood and where your cost advantage lives."},
];

// ─── CTA ────────────────────────────────────────────────────────────────
function CTAScreen({onBack}) {
  return e('div',{style:{textAlign:'center',padding:'40px 20px',flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center'}},
    e(IconTree,{size:36,color:T.amber,sw:1.5}),
    e('div',{style:{fontSize:22,fontWeight:700,lineHeight:1.3,marginBottom:8,marginTop:20}},'This is what KYTHEREX looks like.'),
    e('div',{style:{fontSize:13,color:T.text2,lineHeight:1.7,marginBottom:28,maxWidth:300}},
      'Everything you just saw runs on public data. Plug in your numbers and it gets a lot more specific. Sits on top of whatever systems you already run. Nothing to rip out.'
    ),
    e('div',{style:{display:'flex',gap:16,marginBottom:28,justifyContent:'center'}},
      e('div',{style:{textAlign:'center'}},
        e('div',{style:{fontSize:20,fontWeight:800,color:T.amber}},'$1-5K'),
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:0.5}},'PER MONTH')
      ),
      e('div',{style:{width:1,background:T.border}}),
      e('div',{style:{textAlign:'center'}},
        e('div',{style:{fontSize:20,fontWeight:800,color:T.green}},'3-60x'),
        e('div',{style:{fontSize:9,color:T.muted,letterSpacing:0.5}},'TYPICAL ROI')
      )
    ),
    e('div',{style:{padding:20,background:T.card,borderRadius:12,border:`1px solid ${T.border}`,width:'100%',maxWidth:300,marginBottom:20}},
      e('div',{style:{fontSize:14,fontWeight:700,marginBottom:10}},'Want to see it with your numbers?'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:6,fontSize:13,color:T.text2}},e(IconPhone,{size:13}),' Gillian Shannon'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:6,fontSize:12,color:T.muted}},e(IconTree,{size:13}),' Quality Forest Management'),
      e('div',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,color:T.muted}},e(IconMail,{size:13}),' gillian@strathex.com')
    ),
    e('button',{onClick:onBack,style:{background:'transparent',border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 20px',color:T.text2,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
      e(IconLeft,{size:14}),' Back to features'
    )
  );
}

// ─── APP ────────────────────────────────────────────────────────────────
function App() {
  const [view,setView] = useState("home");
  const [featureId,setFeatureId] = useState(null);
  const containerRef = useRef(null);

  function scrollTop(){if(containerRef.current)containerRef.current.scrollTop=0;}
  function openFeature(id){setFeatureId(id);setView("feature");scrollTop();}
  function goHome(){setView("home");setFeatureId(null);scrollTop();}
  function goCTA(){setView("cta");scrollTop();}

  const feature = SCENARIOS.find(s=>s.id===featureId);
  const Comp = feature?.component;

  return e('div',{style:{background:T.bg,color:T.text,height:'100dvh',maxWidth:480,margin:'0 auto',position:'relative',display:'flex',flexDirection:'column'}},
    // Header
    e('div',{style:{padding:'16px 20px 12px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
      e('div',null,
        e('div',{style:{fontSize:16,fontWeight:700,letterSpacing:3}},'KYTHEREX'),
        e('div',{style:{fontSize:9,fontWeight:400,letterSpacing:1.5,color:T.text2,marginTop:1}},'TIMBER PROCUREMENT ANALYTICS')
      ),
      view!=="home" && e('button',{onClick:goHome,style:{background:'none',border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:4,color:T.text2,fontSize:11}},
        e(IconX,{size:12}),' Close'
      )
    ),
    // Content
    e('div',{ref:containerRef,style:{padding:20,overflowY:'auto',flex:1,paddingBottom:view==="feature"?80:20}},
      view==="home" && e('div',null,
        e('div',{style:{marginBottom:20}},
          e('div',{style:{fontSize:18,fontWeight:700,lineHeight:1.3,marginBottom:6}},'See what KYTHEREX does.'),
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},'Four capabilities. All running on real public data from MT, ID, WA, and OR. Tap any to explore.')
        ),
        SCENARIOS.map(s=>e('div',{key:s.id,onClick:()=>openFeature(s.id),style:{background:T.card,border:`1px solid ${T.border}`,borderLeft:`3px solid ${s.color}`,borderRadius:10,padding:16,marginBottom:10,cursor:'pointer'}},
          e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            e('div',{style:{display:'flex',gap:12,alignItems:'flex-start'}},
              e('div',{style:{color:s.color,marginTop:2}},e(s.iconFn,{size:18,color:s.color})),
              e('div',null,
                e('div',{style:{fontSize:15,fontWeight:700,marginBottom:4}},s.title),
                e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.5}},s.subtitle)
              )
            ),
            e(IconChev,{size:18})
          )
        )),
        e('div',{style:{marginTop:16,textAlign:'center',padding:14,background:T.card,borderRadius:10,border:`1px solid ${T.border}`}},
          e('div',{style:{fontSize:10,color:T.muted,letterSpacing:1}},'STRATHEX, INC.'),
          e('div',{style:{fontSize:11,color:T.text2,marginTop:4}},'Built in Montana, for Montana.')
        )
      ),
      view==="feature" && feature && Comp && e('div',null,
        e(Comp),
        e('div',{style:{marginTop:20,padding:14,background:T.overlay,borderRadius:8,border:`1px solid ${T.border}`}},
          e('div',{style:{fontSize:12,color:T.text2,lineHeight:1.6}},feature.caption)
        )
      ),
      view==="cta" && e(CTAScreen,{onBack:goHome})
    ),
    // Bottom bar
    view==="feature" && e('div',{style:{position:'absolute',bottom:0,left:0,right:0,padding:'10px 20px 22px',background:`linear-gradient(transparent, ${T.overlay} 30%)`,display:'flex',justifyContent:'space-between',zIndex:10}},
      e('button',{onClick:goHome,style:{background:T.card,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 16px',color:T.text2,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}},
        e(IconLeft,{size:14}),' Features'
      ),
      e('button',{onClick:goCTA,style:{background:feature?.color||T.amber,border:'none',borderRadius:8,padding:'10px 20px',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
        'See it with your numbers ',e(IconRight,{size:14})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
